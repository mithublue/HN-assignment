version: '3.8'

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: hn-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: hackernews
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hn-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:@mysql:3306/hackernews
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run start"

volumes:
  mysql_data:
